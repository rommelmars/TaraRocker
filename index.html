<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snook & Gator Press</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/logo.jpg" alt="Logo">
            <span id="logo-text">Snook & Gator Press</span>
        </div>
        <nav>
            <a href="#">Books</a>
            <a href="#">Blogs</a>
            <a href="#">About Author</a>
            <a href="#">Contact Us</a>
            <a href="#">Events</a>
        </nav>
    </header>
    <section class="hero-section">
        <h1>"The Adventures of Snook & Gator Series"</h1>
    </section>
    <section class="books-section">
        <div class="book-container">
            <img src="images/book1.png" alt="Book 1">
            <div class="magnifying-glass"></div>
            <h2>Book Title 1</h2>
            <button class="order-button">Order Now</button>
        </div>
        <div class="book-container">
            <img src="images/book2.png" alt="Book 2">
            <div class="magnifying-glass"></div>
            <h2>Book Title 2</h2>
            <button class="order-button">Order Now</button>
        </div>
        <div class="book-container">
            <img src="images/book3.png" alt="Book 3">
            <div class="magnifying-glass"></div>
            <h2>Book Title 3</h2>
            <button class="order-button">Order Now</button>
        </div>
        <div class="book-container">
            <img src="images/book4.png" alt="Book 4">
            <div class="magnifying-glass"></div>
            <h2>Book Title 4</h2>
            <button class="order-button">Order Now</button>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
